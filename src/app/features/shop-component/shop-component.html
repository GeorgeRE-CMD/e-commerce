<div class="pt-20">
    <div class="border border-gray-400 p-2 rounded-lg 
           w-full sm:w-[180px] md:w-[200px] lg:w-[220px] 
           mx-auto hover:shadow-lg hover:scale-105 transition-all duration-300">

        <!-- overlay icons -->
        <div class="relative text-[1rem] text-gray-400">
            <div
                class="absolute right-2 top-2 w-7 h-7 rounded-full shadow-sm cursor-pointer flex items-center justify-center hover:text-red-400 bg-white">
                <i class="fa-regular fa-heart"></i>
            </div>
            <div
                class="absolute right-2 top-12 w-7 h-7 rounded-full shadow-sm cursor-pointer flex items-center justify-center hover:text-green-400 bg-white">
                <i class="fa-solid fa-arrows-rotate"></i>
            </div>
            <div
                class="absolute right-2 top-20 w-7 h-7 rounded-full shadow-sm cursor-pointer flex items-center justify-center hover:text-green-400 bg-white">
                <i [routerLink]="['/product-details', product().id]" class="fa-solid fa-eye"></i>
            </div>
        </div>

        <!-- product image -->
        <div class="aspect-[3/4] w-full">
            <img class="w-full h-full object-cover rounded-md" [src]="product()?.imageCover" loading="lazy" />
        </div>
        <!-- product info -->
        <div class="mt-2">
            <p class="text-[#6a7282] text-xs font-medium">{{product()?.category?.name}}</p>
            <p class="leading-5 font-medium text-[#364153] text-sm truncate">{{ product()?.title }}</p>
            <p class="text-xs">{{product()?.ratingsQuantity}}</p>

            <div class="flex justify-between items-center flex-wrap gap-2">
                <div class="flex gap-2 text-xs">
                    @if (product()?.priceAfterDiscount) {
                    <p class="text-green-600 font-semibold">
                        {{ product()?.priceAfterDiscount }} EGP
                    </p>
                    <p [class.line-through]='product()?.priceAfterDiscount'>
                        {{product()?.price}}EGP
                    </p>
                    }
                </div>
                <div>
                    <button (click)="addProductsToUserCart()" [disabled]="isLoading()"
                        class="cursor-pointer w-7 h-7 rounded-full bg-[#16a34a] hover:bg-[#15803D] transition-all duration-300 flex items-center justify-center">
                        @if(isLoading()) {
                        <i class="fa-solid fa-spinner fa-spin text-white text-[0.65rem]"></i>
                        } @else {
                        <i [ngClass]="success()?'fa-check':'fa-plus'" class="fa-solid text-white text-[0.65rem]"></i>
                        }
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
